<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 9 BOOks Pdf</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->

    <header>
        <nav>
            <div class="logo"><span>Class 9 </span>Books PDFs</div>
            <div class="search-bar">
                <input type="text" id="subjectSearch" placeholder="Search for book.." </div>
        </nav>
    </header>

    <!-- SECTION -->

    <section class="hero">
        <h1>Class 9 Books</h1>
        <p>Access all class 9 books in PDF format for completely free!</p>
        <p>created by Dilsan Basnet</p>
    </section>

    <!-- MAIN -->

    <main class="subject-gride" id="grid"></main>

    <!-- Last Footer -->
    <footer>
        <p> 2025 Class 9 Books PDF</p>
    </footer>

 <div id="pdfModal" class="modal">
        <div class="modal-content">

            <div class="modal-header">
                <h2 id="modalTitle">BOOK Viewer</h2>
                <span class="close-btn">&times;</span>
            </div>

            <iframe src="" frameborder="0" id="pdfFrame"></iframe>

            <div class="modal-footer">
                <p> <a href="#" id="fallbackLink">Click here to open directly</a>.</p>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->

    <script src="script.js"></script>
      
</body>

</html>
